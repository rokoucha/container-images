name: Build otelcol Binary

on:
  workflow_dispatch:
    inputs:
      bake_target:
        description: otelcol bake target to build
        type: string
        required: true
      timestamp:
        description: CalVer timestamp (YYYYMMDD.HHmmss JST). Empty = auto-generate.
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      bake_target:
        description: otelcol bake target to build
        type: string
        required: true
      timestamp:
        description: CalVer timestamp (YYYYMMDD.HHmmss JST). Empty = auto-generate.
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Resolve timestamp
        id: ts
        run: |
          if [ -n "${{ inputs.timestamp }}" ]; then
            echo "value=${{ inputs.timestamp }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(TZ=Asia/Tokyo date +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Install OpenTelemetry Collector Builder
        run: |
          ocb_version=$(sed -n 's/.*opentelemetry-collector-builder:\([^ ]*\).*/\1/p' otelcol/Dockerfile)
          test -n "$ocb_version"
          go install "go.opentelemetry.io/collector/cmd/builder@v${ocb_version}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build binary
        env:
          BAKE_TARGET: ${{ inputs.bake_target }}
          OUTPUT_NAME: otelcol-${{ inputs.bake_target }}-linux-amd64
        run: |
          cd "otelcol/${BAKE_TARGET}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            builder --config manifest.yaml --ldflags "-s -w"
          cd ../..
          mkdir -p dist
          cp "otelcol/${BAKE_TARGET}/build/otelcol" "dist/${OUTPUT_NAME}"
          tar -C dist -czf "dist/${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"

      - name: Upload build result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: otelcol-${{ steps.ts.outputs.value }}-${{ inputs.bake_target }}-linux-amd64-tar-gz
          path: dist/otelcol-${{ inputs.bake_target }}-linux-amd64.tar.gz
