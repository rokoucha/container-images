name: otelcol build

on:
  push:
    paths:
      - otelcol/**
      - .github/workflows/build-otelcol.yml
      - .github/workflows/wf-build-otelcol-binary.yml
      - .github/workflows/wf-build.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.value }}
      timestamp: ${{ steps.ts.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get bake targets
        id: targets
        run: |
          targets=$(docker buildx bake \
            --file otelcol/docker-bake.hcl \
            --print 2>/dev/null \
            | jq -c '.group.default.targets')
          echo "value=$targets" >> $GITHUB_OUTPUT

      - name: Generate timestamp
        id: ts
        run: echo "value=$(TZ=Asia/Tokyo date +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix:
        bake_target: ${{ fromJson(needs.prepare.outputs.targets) }}
    uses: ./.github/workflows/wf-build.yml
    with:
      push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      target: otelcol
      bake_target: ${{ matrix.bake_target }}
      timestamp: ${{ needs.prepare.outputs.timestamp }}
    permissions:
      contents: read
      packages: write

  build-binary:
    needs: prepare
    strategy:
      matrix:
        bake_target: ${{ fromJson(needs.prepare.outputs.targets) }}
    uses: ./.github/workflows/wf-build-otelcol-binary.yml
    with:
      bake_target: ${{ matrix.bake_target }}
      timestamp: ${{ needs.prepare.outputs.timestamp }}
    permissions:
      contents: read

  release:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs:
      - prepare
      - build
      - build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: otelcol-${{ needs.prepare.outputs.timestamp }}-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum otelcol-*.tar.gz > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.prepare.outputs.timestamp }}
        run: |
          gh release create "$VERSION_TAG" dist/otelcol-*.tar.gz dist/SHA256SUMS \
            --generate-notes \
            --latest \
            --target "$GITHUB_SHA" \
            --title "$VERSION_TAG"
