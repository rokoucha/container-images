name: Build

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push built images to registry
        type: boolean
        required: false
        default: true
      target:
        description: Target image to build
        type: string
        required: true
      bake_target:
        description: Specific bake target to build (empty = default group)
        type: string
        required: false
        default: ""
      timestamp:
        description: CalVer timestamp (YYYYMMDD.HHmmss JST). Empty = auto-generate.
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      push:
        description: Push built images to registry
        type: boolean
        required: false
        default: true
      target:
        description: Target image to build
        type: string
        required: true
      bake_target:
        description: Specific bake target to build (empty = default group)
        type: string
        required: false
        default: ""
      timestamp:
        description: CalVer timestamp (YYYYMMDD.HHmmss JST). Empty = auto-generate.
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - if: inputs.push
        name: Login to ghcr.io
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve timestamp
        id: ts
        run: |
          if [ -n "${{ inputs.timestamp }}" ]; then
            echo "value=${{ inputs.timestamp }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(TZ=Asia/Tokyo date +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Generate image metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: metadata
        with:
          images: ghcr.io/rokoucha/${{ inputs.target }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ts.outputs.value }},enable={{is_default_branch}}
            type=ref,event=pr
            type=sha

      - name: Build and Push
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        env:
          ON_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        with:
          push: ${{ inputs.push }}
          source: ./${{ inputs.target }}
          targets: ${{ inputs.bake_target }}
          files: |
            docker-bake.hcl
            ${{ steps.metadata.outputs.bake-file }}
          set: |
            *.cache-from=type=gha
            ${{  env.ON_DEFAULT_BRANCH == 'true' && '*.cache-to=type=gha,mode=max' || '' }}
